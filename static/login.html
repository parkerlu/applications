<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WPP – Sign In</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        body { min-height: 100vh; display: flex; flex-direction: column; }
    </style>
</head>
<body>

    <header class="login-header">
        <h1>WPP</h1>
    </header>

    <div class="login-main">
        <div class="login-card">

            <!-- Login Form -->
            <div id="loginForm">
                <h2>Sign In</h2>
                <div id="error" class="error-msg" style="display:none;"></div>
                <form onsubmit="login(event)">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" autocomplete="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Sign In</button>
                </form>
            </div>

            <!-- Change Password Form -->
            <div id="changePasswordForm" style="display: none;">
                <h2>Change Your Password</h2>
                <div id="cpError" class="error-msg" style="display:none;"></div>
                <form onsubmit="changePassword(event)">
                    <div class="form-group">
                        <label for="newPassword">New Password</label>
                        <input type="password" id="newPassword" name="newPassword" autocomplete="new-password" required>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm New Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Update Password</button>
                </form>
            </div>

        </div>
    </div>

    <script>
        var loginPassword = '';

        async function login(e) {
            e.preventDefault();
            var username = document.getElementById('username').value;
            var password = document.getElementById('password').value;
            loginPassword = password;

            var res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: username, password: password })
            });
            var data = await res.json();
            if (data.success) {
                if (data.user.must_change_password) {
                    document.getElementById('loginForm').style.display = 'none';
                    document.getElementById('changePasswordForm').style.display = 'block';
                } else {
                    window.location.href = '/dashboard';
                }
            } else {
                document.getElementById('error').textContent = data.error || 'Login failed';
                document.getElementById('error').style.display = 'block';
            }
        }

        async function changePassword(e) {
            e.preventDefault();
            var newPass = document.getElementById('newPassword').value;
            var confirmPass = document.getElementById('confirmPassword').value;
            if (newPass !== confirmPass) {
                document.getElementById('cpError').textContent = 'Passwords do not match';
                document.getElementById('cpError').style.display = 'block';
                return;
            }
            if (newPass.length < 6) {
                document.getElementById('cpError').textContent = 'Password must be at least 6 characters';
                document.getElementById('cpError').style.display = 'block';
                return;
            }
            var res = await fetch('/api/change-password', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ old_password: loginPassword, new_password: newPass })
            });
            var data = await res.json();
            if (data.success) {
                window.location.href = '/dashboard';
            } else {
                document.getElementById('cpError').textContent = data.error || 'Failed to change password';
                document.getElementById('cpError').style.display = 'block';
            }
        }
    </script>

</body>
</html>
