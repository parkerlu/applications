<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WPP – Sign In</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: #0033A0;
            color: #ffffff;
            padding: 16px 32px;
            display: flex;
            align-items: center;
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 0.04em;
        }

        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
        }

        .card {
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.10);
            padding: 40px 36px;
            width: 100%;
            max-width: 400px;
        }

        .card h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0033A0;
            margin-bottom: 28px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #333333;
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px 14px;
            font-size: 1rem;
            font-family: inherit;
            border: 1px solid #ced4da;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.2s;
            color: #212529;
            background: #ffffff;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #0033A0;
            box-shadow: 0 0 0 3px rgba(0, 51, 160, 0.12);
        }

        .btn-primary {
            width: 100%;
            padding: 11px;
            font-size: 1rem;
            font-family: inherit;
            font-weight: 600;
            color: #ffffff;
            background-color: #0033A0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 8px;
            transition: background-color 0.2s;
        }

        .btn-primary:hover {
            background-color: #002480;
        }

        .btn-primary:active {
            background-color: #001d66;
        }

        .error-msg {
            display: none;
            background-color: #fff0f0;
            color: #c0392b;
            border: 1px solid #f5c6c6;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 0.875rem;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>

    <header>
        <h1>WPP</h1>
    </header>

    <div class="main">
        <div class="card">

            <!-- Login Form -->
            <div id="loginForm">
                <h2>Sign In</h2>
                <div id="error" class="error-msg"></div>
                <form onsubmit="login(event)">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" autocomplete="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="btn-primary">Sign In</button>
                </form>
            </div>

            <!-- Change Password Form -->
            <div id="changePasswordForm" style="display: none;">
                <h2>Change Your Password</h2>
                <div id="cpError" class="error-msg"></div>
                <form onsubmit="changePassword(event)">
                    <div class="form-group">
                        <label for="newPassword">New Password</label>
                        <input type="password" id="newPassword" name="newPassword" autocomplete="new-password" required>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm New Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password" required>
                    </div>
                    <button type="submit" class="btn-primary">Update Password</button>
                </form>
            </div>

        </div>
    </div>

    <script>
        var loginPassword = '';

        async function login(e) {
            e.preventDefault();
            var username = document.getElementById('username').value;
            var password = document.getElementById('password').value;
            loginPassword = password;

            var res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: username, password: password })
            });
            var data = await res.json();
            if (data.success) {
                if (data.user.must_change_password) {
                    document.getElementById('loginForm').style.display = 'none';
                    document.getElementById('changePasswordForm').style.display = 'block';
                } else {
                    window.location.href = '/dashboard';
                }
            } else {
                document.getElementById('error').textContent = data.error || 'Login failed';
                document.getElementById('error').style.display = 'block';
            }
        }

        async function changePassword(e) {
            e.preventDefault();
            var newPass = document.getElementById('newPassword').value;
            var confirmPass = document.getElementById('confirmPassword').value;
            if (newPass !== confirmPass) {
                document.getElementById('cpError').textContent = 'Passwords do not match';
                document.getElementById('cpError').style.display = 'block';
                return;
            }
            if (newPass.length < 6) {
                document.getElementById('cpError').textContent = 'Password must be at least 6 characters';
                document.getElementById('cpError').style.display = 'block';
                return;
            }
            var res = await fetch('/api/change-password', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ old_password: loginPassword, new_password: newPass })
            });
            var data = await res.json();
            if (data.success) {
                window.location.href = '/dashboard';
            } else {
                document.getElementById('cpError').textContent = data.error || 'Failed to change password';
                document.getElementById('cpError').style.display = 'block';
            }
        }
    </script>

</body>
</html>
