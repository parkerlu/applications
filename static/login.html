                    "on-secondary-fixed": "#004820",
                    "on-background": "#ffffff",
                    "on-secondary-fixed-variant": "#006832",

<style>
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        font-size: 20px;
    }
    .glass-panel {
        background: rgba(38, 38, 38, 0.8);
        backdrop-filter: blur(40px);
        -webkit-backdrop-filter: blur(40px);
    }
    .neon-glow:focus-within {
        box-shadow: 0 0 15px rgba(148, 170, 255, 0.3);
    }
    .collage-container {
        perspective: 1000px;
    }
    .floating-asset {
        filter: grayscale(20%) brightness(0.7);
        transition: all 0.5s ease;
    }
    .floating-asset:hover {
        filter: grayscale(0%) brightness(1);
        transform: translateZ(20px);
    }
    .error-toast {
        background: rgba(159,5,25,0.9);
        color: #ffa8a3;
        border: 1px solid rgba(255,113,108,0.25);
        border-radius: 0.75rem;
        padding: 10px 16px;
        font-size: 0.85rem;
        margin-bottom: 16px;
        display: none;
    }
    .error-toast.visible { display: block; }
</style>
</head>
<body class="bg-background font-body text-on-background overflow-hidden selection:bg-primary selection:text-on-primary">
<!-- The Neon Collage Background -->
<div class="fixed inset-0 z-0 overflow-hidden collage-container">
<div class="absolute inset-0 bg-gradient-to-br from-surface via-surface-container-low to-surface-container-lowest opacity-90"></div>
<div class="absolute top-[-5%] left-[-5%] w-1/3 h-1/2 floating-asset transform -rotate-12">
<img class="w-full h-full object-cover rounded-xxl opacity-40" alt="Workstation setup" src="/static/images/bg1.jpg">
</div>
<div class="absolute bottom-[10%] right-[-5%] w-1/4 h-1/3 floating-asset transform rotate-6">
<img class="w-full h-full object-cover rounded-xxl opacity-30" alt="Mechanical keyboard" src="/static/images/bg2.jpg">
</div>
<div class="absolute top-[20%] right-[15%] w-1/5 h-1/4 floating-asset transform -rotate-3">
<img class="w-full h-full object-cover rounded-xxl opacity-20" alt="Monitor setup" src="/static/images/bg3.jpg">
</div>
<div class="absolute bottom-[-10%] left-[20%] w-1/4 h-2/5 floating-asset transform rotate-12">
<img class="w-full h-full object-cover rounded-xxl opacity-25" alt="Creative hardware" src="/static/images/bg4.jpg">
</div>
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-tertiary/5 rounded-full blur-[120px]"></div>
</div>
<!-- Login Canvas -->
<main class="relative z-10 flex min-h-screen items-center justify-center p-6">
<div class="glass-panel w-full max-w-md rounded-xxl p-10 shadow-[0_40px_80px_rgba(0,0,0,0.5)] border border-outline-variant/15">
<!-- Logo/Header -->
<div class="mb-10 text-center">
<div class="mb-4 inline-flex h-16 w-16 items-center justify-center rounded-xl bg-gradient-to-tr from-primary to-primary-dim shadow-[0_0_20px_rgba(148,170,255,0.4)]">
<span class="material-symbols-outlined text-on-primary text-3xl" style="font-variation-settings: 'FILL' 1;">deployed_code</span>
</div>
<h1 class="font-headline text-3xl font-black tracking-tighter text-on-surface">
    WPP&nbsp; ET&nbsp; Login
</h1>
<p class="font-body text-on-surface-variant mt-2 text-sm">
    Access your WPP hardware applications
</p>
</div>

<!-- Login Form -->
<div id="loginForm">
<div id="error" class="error-toast"></div>
<form onsubmit="login(event)" class="space-y-6">
<div class="space-y-2">
<label class="font-label text-xs font-semibold uppercase tracking-widest text-on-surface-variant ml-1" for="username">Username</label>
<div class="relative neon-glow transition-all duration-300">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined">person</span>
</div>
<input class="w-full bg-surface-container-highest border border-outline-variant/15 rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-outline focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary/50 transition-all font-body" id="username" name="username" autocomplete="username" placeholder="Enter your agency ID" type="text" required>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-end px-1">
<label class="font-label text-xs font-semibold uppercase tracking-widest text-on-surface-variant" for="password">Password</label>
<a class="text-xs text-primary hover:text-primary-fixed-dim transition-colors font-medium" href="#">Forgot?</a>
</div>
<div class="relative neon-glow transition-all duration-300">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined">lock</span>
</div>
<input class="w-full bg-surface-container-highest border border-outline-variant/15 rounded-xl py-4 pl-12 pr-12 text-on-surface placeholder:text-outline focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary/50 transition-all font-body" id="password" name="password" autocomplete="current-password" placeholder="Enter your password" type="password" required>
<button class="absolute inset-y-0 right-0 flex items-center pr-4 text-on-surface-variant hover:text-primary transition-colors" type="button" onclick="togglePassword()">
<span class="material-symbols-outlined" id="pwToggleIcon">visibility</span>
</button>
</div>
</div>
<div class="flex items-center px-1">
<input class="h-4 w-4 rounded border-outline-variant/20 bg-surface-container-highest text-primary focus:ring-primary/40 focus:ring-offset-0" id="remember" type="checkbox">
<label class="ml-2 text-sm text-on-surface-variant font-body" for="remember">Keep me signed in</label>
</div>
<button class="group relative w-full overflow-hidden rounded-xl bg-gradient-to-r from-primary to-primary-dim py-4 px-6 font-headline font-bold text-on-primary-fixed shadow-[0_10px_20px_rgba(148,170,255,0.2)] transition-all hover:shadow-[0_15px_30px_rgba(148,170,255,0.4)] hover:scale-[1.02] active:scale-[0.98]" type="submit">
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="flex items-center justify-center gap-2">
    Sign In
    <span class="material-symbols-outlined text-xl">arrow_forward</span>
</span>
</button>
</form>
</div>

<!-- Change Password Form -->
<div id="changePasswordForm" style="display:none;">
<div id="cpError" class="error-toast"></div>
<form onsubmit="changePassword(event)" class="space-y-6">
<div class="space-y-2">
<label class="font-label text-xs font-semibold uppercase tracking-widest text-on-surface-variant ml-1" for="newPassword">New Password</label>
<div class="relative neon-glow transition-all duration-300">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined">lock</span>
</div>
<input class="w-full bg-surface-container-highest border border-outline-variant/15 rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-outline focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary/50 transition-all font-body" id="newPassword" name="newPassword" autocomplete="new-password" placeholder="Enter new password" type="password" required>
</div>
</div>
<div class="space-y-2">
<label class="font-label text-xs font-semibold uppercase tracking-widest text-on-surface-variant ml-1" for="confirmPassword">Confirm New Password</label>
<div class="relative neon-glow transition-all duration-300">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined">lock</span>
</div>
<input class="w-full bg-surface-container-highest border border-outline-variant/15 rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-outline focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary/50 transition-all font-body" id="confirmPassword" name="confirmPassword" autocomplete="new-password" placeholder="Confirm new password" type="password" required>
</div>
</div>
<button class="group relative w-full overflow-hidden rounded-xl bg-gradient-to-r from-primary to-primary-dim py-4 px-6 font-headline font-bold text-on-primary-fixed shadow-[0_10px_20px_rgba(148,170,255,0.2)] transition-all hover:shadow-[0_15px_30px_rgba(148,170,255,0.4)] hover:scale-[1.02] active:scale-[0.98]" type="submit">
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="flex items-center justify-center gap-2">
    Update Password
    <span class="material-symbols-outlined text-xl">arrow_forward</span>
</span>
</button>
</form>
</div>

<!-- Footer -->
<div class="mt-8 pt-8 border-t border-outline-variant/10 text-center">
<p class="text-sm text-on-surface-variant font-body">
    Need assistance? <a class="text-secondary font-semibold hover:underline decoration-secondary/30" href="https://it.wpp.com" target="_blank">Contact IT Support</a>
</p>
</div>
</div>

<!-- Bottom left info -->
<div class="absolute bottom-10 left-10 hidden lg:block opacity-40">
<div class="flex items-center gap-4 text-on-surface-variant">
<div class="h-px w-12 bg-outline-variant"></div>
<p class="text-[10px] uppercase tracking-[0.2em] font-headline font-bold">WPP ET // IT ASSET PORTAL</p>
</div>
</div>
<!-- Top right status -->
<div class="absolute top-10 right-10 hidden lg:flex items-center gap-6">
<div class="flex flex-col items-end">
<span class="text-[10px] font-bold text-primary tracking-tighter uppercase">Server Status</span>
<span class="text-xs text-secondary font-medium flex items-center gap-1.5">
<span class="h-1.5 w-1.5 rounded-full bg-secondary shadow-[0_0_8px_#3fff8b]"></span>
    Operational
</span>
</div>
</div>
</main>

<script>
    var loginPassword = '';

    function togglePassword() {
        var pw = document.getElementById('password');
        var icon = document.getElementById('pwToggleIcon');
        if (pw.type === 'password') { pw.type = 'text'; icon.textContent = 'visibility_off'; }
        else { pw.type = 'password'; icon.textContent = 'visibility'; }
    }

    async function login(e) {
        e.preventDefault();
        var username = document.getElementById('username').value;
        var password = document.getElementById('password').value;
        loginPassword = password;

        var res = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ username: username, password: password })
        });
        var data = await res.json();
        if (data.success) {
            if (data.user.must_change_password) {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('changePasswordForm').style.display = 'block';
            } else {
                window.location.href = '/dashboard';
            }
        } else {
            var el = document.getElementById('error');
            el.textContent = data.error || 'Login failed';
            el.classList.add('visible');
        }
    }

    async function changePassword(e) {
        e.preventDefault();
        var newPass = document.getElementById('newPassword').value;
        var confirmPass = document.getElementById('confirmPassword').value;
        if (newPass !== confirmPass) {
            var el = document.getElementById('cpError');
            el.textContent = 'Passwords do not match';
            el.classList.add('visible');
            return;
        }
        if (newPass.length < 6) {
            var el = document.getElementById('cpError');
            el.textContent = 'Password must be at least 6 characters';
            el.classList.add('visible');
            return;
        }
        var res = await fetch('/api/change-password', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ old_password: loginPassword, new_password: newPass })
        });
        var data = await res.json();
        if (data.success) {
            window.location.href = '/dashboard';
        } else {
            var el = document.getElementById('cpError');
            el.textContent = data.error || 'Failed to change password';
            el.classList.add('visible');
        }
    }
</script>
</body></html>
