<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>WPP – Sign In</title>
<script src="/static/css/tailwind.js"></script>
<link href="/static/fonts/fonts.css" rel="stylesheet">
<link href="/static/fonts/material.css" rel="stylesheet">
<script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary-dim": "#3367ff",
                    "on-surface": "#ffffff",
                    "surface": "#0e0e0e",
                    "primary": "#94aaff",
                    "on-primary-fixed": "#000000",
                    "outline": "#767575",
                    "outline-variant": "#484847",
                    "on-primary-fixed-variant": "#002376",
                    "primary-fixed-dim": "#6c8cff",
                    "primary-fixed": "#809bff",
                    "secondary": "#3fff8b",
                    "error": "#ff716c",
                    "background": "#0e0e0e",
                    "on-background": "#ffffff",
                    "on-primary": "#00257b",
                },
                fontFamily: {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
                },
                borderRadius: {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "xxl": "1.5rem",
                    "full": "9999px"
                },
            },
        },
    }
</script>
<style>
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        font-size: 20px;
    }
    .glass-panel {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .neon-glow:focus-within {
        box-shadow: 0 0 15px rgba(148, 170, 255, 0.3);
    }
    .error-toast {
        background: rgba(159,5,25,0.9);
        color: #ffa8a3;
        border: 1px solid rgba(255,113,108,0.25);
        border-radius: 0.75rem;
        padding: 10px 16px;
        font-size: 0.85rem;
        margin-bottom: 16px;
        display: none;
    }
    .error-toast.visible { display: block; }
</style>
</head>
<body class="bg-background font-body text-on-background overflow-hidden selection:bg-primary selection:text-on-primary">
<!-- Background -->
<div class="fixed inset-0 z-0">
<img alt="Abstract gradient background" class="w-full h-full object-cover" src="/static/images/login-bg.jpg">
<div class="absolute inset-0 bg-black/20"></div>
</div>
<!-- Login Canvas -->
<main class="relative z-10 flex min-h-screen items-center justify-center p-6">
<div class="glass-panel w-full max-w-md rounded-xxl p-10 shadow-[0_40px_80px_rgba(0,0,0,0.4)]">
<!-- Logo/Header -->
<div class="mb-10 text-center">
<div class="mb-4 inline-flex h-16 w-16 items-center justify-center rounded-xl bg-gradient-to-tr from-primary to-primary-dim shadow-[0_0_20px_rgba(148,170,255,0.4)]">
<span class="material-symbols-outlined text-on-primary text-3xl" style="font-variation-settings: 'FILL' 1;">deployed_code</span>
</div>
<h1 class="font-headline text-3xl font-black tracking-tighter text-on-surface">
    WPP ET Login
</h1>
<p class="font-body text-white/70 mt-2 text-sm">
    Access your WPP hardware applications
</p>
</div>

<!-- Login Form -->
<div id="loginForm">
<div id="error" class="error-toast"></div>
<form onsubmit="login(event)" class="space-y-6">
<div class="space-y-2">
<label class="font-label text-xs font-semibold uppercase tracking-widest text-white/60 ml-1" for="username">Username</label>
<div class="relative neon-glow transition-all duration-300">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-white/50">
<span class="material-symbols-outlined">person</span>
</div>
<input class="w-full bg-white/5 border border-white/10 rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-white/30 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary/50 transition-all font-body" id="username" name="username" autocomplete="username" placeholder="Enter your agency ID" type="text" required>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-end px-1">
<label class="font-label text-xs font-semibold uppercase tracking-widest text-white/60" for="password">Password</label>
<a class="text-xs text-primary hover:text-primary-fixed-dim transition-colors font-medium" href="#">Forgot?</a>
</div>
<div class="relative neon-glow transition-all duration-300">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-white/50">
<span class="material-symbols-outlined">lock</span>
</div>
<input class="w-full bg-white/5 border border-white/10 rounded-xl py-4 pl-12 pr-12 text-on-surface placeholder:text-white/30 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary/50 transition-all font-body" id="password" name="password" autocomplete="current-password" placeholder="Enter your password" type="password" required>
<button class="absolute inset-y-0 right-0 flex items-center pr-4 text-white/50 hover:text-primary transition-colors" type="button" onclick="togglePassword()">
<span class="material-symbols-outlined" id="pwToggleIcon">visibility</span>
</button>
</div>
</div>
<div class="flex items-center px-1">
<input class="h-4 w-4 rounded border-white/20 bg-white/5 text-primary focus:ring-primary/40 focus:ring-offset-0" id="remember" type="checkbox">
<label class="ml-2 text-sm text-white/60 font-body" for="remember">Keep me signed in</label>
</div>
<button class="group relative w-full overflow-hidden rounded-xl bg-gradient-to-r from-primary to-primary-dim py-4 px-6 font-headline font-bold text-on-primary-fixed shadow-[0_10px_20px_rgba(148,170,255,0.2)] transition-all hover:shadow-[0_15px_30px_rgba(148,170,255,0.4)] hover:scale-[1.02] active:scale-[0.98]" type="submit">
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="flex items-center justify-center gap-2">
    Sign In
    <span class="material-symbols-outlined text-xl">arrow_forward</span>
</span>
</button>
</form>
</div>

<!-- Change Password Form -->
<div id="changePasswordForm" style="display:none;">
<div id="cpError" class="error-toast"></div>
<div class="mb-6 text-center">
<h2 class="font-headline text-xl font-bold text-on-surface">Change Your Password</h2>
</div>
<form onsubmit="changePassword(event)" class="space-y-6">
<div class="space-y-2">
<label class="font-label text-xs font-semibold uppercase tracking-widest text-white/60 ml-1" for="newPassword">New Password</label>
<div class="relative neon-glow transition-all duration-300">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-white/50">
<span class="material-symbols-outlined">lock</span>
</div>
<input class="w-full bg-white/5 border border-white/10 rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-white/30 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary/50 transition-all font-body" id="newPassword" name="newPassword" autocomplete="new-password" placeholder="Enter new password" type="password" required>
</div>
</div>
<div class="space-y-2">
<label class="font-label text-xs font-semibold uppercase tracking-widest text-white/60 ml-1" for="confirmPassword">Confirm New Password</label>
<div class="relative neon-glow transition-all duration-300">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-white/50">
<span class="material-symbols-outlined">lock</span>
</div>
<input class="w-full bg-white/5 border border-white/10 rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-white/30 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary/50 transition-all font-body" id="confirmPassword" name="confirmPassword" autocomplete="new-password" placeholder="Confirm new password" type="password" required>
</div>
</div>
<button class="group relative w-full overflow-hidden rounded-xl bg-gradient-to-r from-primary to-primary-dim py-4 px-6 font-headline font-bold text-on-primary-fixed shadow-[0_10px_20px_rgba(148,170,255,0.2)] transition-all hover:shadow-[0_15px_30px_rgba(148,170,255,0.4)] hover:scale-[1.02] active:scale-[0.98]" type="submit">
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="flex items-center justify-center gap-2">
    Update Password
    <span class="material-symbols-outlined text-xl">arrow_forward</span>
</span>
</button>
</form>
</div>

<!-- Footer -->
<div class="mt-8 pt-8 border-t border-white/10 text-center">
<p class="text-sm text-white/60 font-body">
    Need assistance? <a class="text-secondary font-semibold hover:underline decoration-secondary/30" href="https://it.wpp.com" target="_blank">Contact IT Support</a>
</p>
</div>
</div>

<!-- Status Info -->
<div class="absolute top-10 right-10 hidden lg:flex items-center gap-6">
<div class="flex flex-col items-end">
<span class="text-[10px] font-bold text-primary tracking-tighter uppercase">Server Status</span>
<span class="text-xs text-secondary font-medium flex items-center gap-1.5">
<span class="h-1.5 w-1.5 rounded-full bg-secondary shadow-[0_0_8px_#3fff8b]"></span>
    Operational
</span>
</div>
</div>
</main>

<script>
    var loginPassword = '';

    function togglePassword() {
        var pw = document.getElementById('password');
        var icon = document.getElementById('pwToggleIcon');
        if (pw.type === 'password') { pw.type = 'text'; icon.textContent = 'visibility_off'; }
        else { pw.type = 'password'; icon.textContent = 'visibility'; }
    }

    async function login(e) {
        e.preventDefault();
        var username = document.getElementById('username').value;
        var password = document.getElementById('password').value;
        loginPassword = password;
        var res = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ username: username, password: password })
        });
        var data = await res.json();
        if (data.success) {
            if (data.user.must_change_password) {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('changePasswordForm').style.display = 'block';
            } else {
                window.location.href = '/dashboard';
            }
        } else {
            var el = document.getElementById('error');
            el.textContent = data.error || 'Login failed';
            el.classList.add('visible');
        }
    }

    async function changePassword(e) {
        e.preventDefault();
        var newPass = document.getElementById('newPassword').value;
        var confirmPass = document.getElementById('confirmPassword').value;
        if (newPass !== confirmPass) {
            var el = document.getElementById('cpError');
            el.textContent = 'Passwords do not match';
            el.classList.add('visible');
            return;
        }
        if (newPass.length < 6) {
            var el = document.getElementById('cpError');
            el.textContent = 'Password must be at least 6 characters';
            el.classList.add('visible');
            return;
        }
        var res = await fetch('/api/change-password', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ old_password: loginPassword, new_password: newPass })
        });
        var data = await res.json();
        if (data.success) {
            window.location.href = '/dashboard';
        } else {
            var el = document.getElementById('cpError');
            el.textContent = data.error || 'Failed to change password';
            el.classList.add('visible');
        }
    }
</script>
</body></html>
