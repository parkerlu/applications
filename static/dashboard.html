<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WPP – Dashboard</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary: #0033A0;
  --primary-dark: #002266;
  --primary-light: #e8edf7;
  --success: #28a745;
  --danger: #dc3545;
  --gray-100: #f8f9fa;
  --gray-200: #e9ecef;
  --gray-300: #dee2e6;
  --gray-500: #adb5bd;
  --gray-700: #495057;
  --gray-900: #212529;
  --sidebar-bg: #1a1a2e;
  --sidebar-text: #c8ccd8;
  --sidebar-hover: rgba(255,255,255,0.08);
  --sidebar-active: var(--primary);
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --radius: 8px;
}

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--gray-100);
  color: var(--gray-900);
  line-height: 1.5;
}

/* ── Layout ──────────────────────────────────────────── */
.layout {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ── Sidebar ─────────────────────────────────────────── */
.sidebar {
  width: 240px;
  min-width: 240px;
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-logo {
  padding: 24px 20px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.sidebar-logo .logo-title {
  font-size: 1.5rem;
  font-weight: 800;
  color: #fff;
  letter-spacing: 0.06em;
}

.sidebar-logo .logo-sub {
  font-size: 0.7rem;
  color: rgba(255,255,255,0.45);
  margin-top: 2px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.sidebar-nav {
  flex: 1;
  padding: 12px 0;
  overflow-y: auto;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 20px;
  cursor: pointer;
  color: var(--sidebar-text);
  font-size: 0.875rem;
  font-weight: 500;
  border-left: 3px solid transparent;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  text-decoration: none;
  user-select: none;
}

.nav-item:hover {
  background: var(--sidebar-hover);
  color: #fff;
}

.nav-item.active {
  background: rgba(0, 51, 160, 0.25);
  border-left-color: var(--primary);
  color: #fff;
}

.nav-item .nav-icon {
  font-size: 1rem;
  width: 20px;
  text-align: center;
  flex-shrink: 0;
}

.sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid rgba(255,255,255,0.08);
}

.user-info {
  margin-bottom: 12px;
}

.user-name {
  font-size: 0.875rem;
  font-weight: 600;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.user-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 4px;
}

.user-opco {
  font-size: 0.72rem;
  color: rgba(255,255,255,0.45);
}

.role-badge {
  font-size: 0.65rem;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.role-badge.admin {
  background: rgba(220, 53, 69, 0.25);
  color: #ff8a94;
  border: 1px solid rgba(220, 53, 69, 0.35);
}

.role-badge.user {
  background: rgba(0, 51, 160, 0.3);
  color: #7fa8ff;
  border: 1px solid rgba(0, 51, 160, 0.4);
}

.btn-logout {
  width: 100%;
  padding: 9px 14px;
  font-size: 0.8rem;
  font-family: inherit;
  font-weight: 600;
  color: var(--sidebar-text);
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}

.btn-logout:hover {
  background: rgba(220, 53, 69, 0.2);
  color: #ff8a94;
  border-color: rgba(220, 53, 69, 0.3);
}

/* ── Main content ────────────────────────────────────── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.content {
  flex: 1;
  overflow-y: auto;
  padding: 32px 36px;
}

/* ── Page header ─────────────────────────────────────── */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}

.page-header h2 {
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--gray-900);
}

/* ── Buttons ─────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 9px 18px;
  font-size: 0.85rem;
  font-family: inherit;
  font-weight: 600;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s, opacity 0.15s;
  text-decoration: none;
}

.btn-primary {
  background: var(--primary);
  color: #fff;
}
.btn-primary:hover { background: var(--primary-dark); }

.btn-secondary {
  background: var(--gray-200);
  color: var(--gray-700);
}
.btn-secondary:hover { background: var(--gray-300); }

.btn-danger {
  background: var(--danger);
  color: #fff;
}
.btn-danger:hover { opacity: 0.88; }

.btn-sm {
  padding: 5px 12px;
  font-size: 0.78rem;
}

.btn-icon {
  padding: 5px 9px;
  font-size: 0.9rem;
}

/* ── Table ───────────────────────────────────────────── */
.table-card {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}

.table-wrapper {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.875rem;
}

thead th {
  background: var(--gray-100);
  padding: 12px 16px;
  text-align: left;
  font-weight: 600;
  font-size: 0.78rem;
  color: var(--gray-700);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  border-bottom: 1px solid var(--gray-200);
  white-space: nowrap;
}

tbody td {
  padding: 13px 16px;
  border-bottom: 1px solid var(--gray-200);
  color: var(--gray-900);
  vertical-align: middle;
}

tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: var(--gray-100); }

.actions-cell {
  display: flex;
  gap: 6px;
  align-items: center;
}

/* ── Empty state ─────────────────────────────────────── */
.empty-state {
  padding: 60px 24px;
  text-align: center;
  color: var(--gray-500);
}

.empty-state .empty-icon {
  font-size: 2.5rem;
  margin-bottom: 12px;
  display: block;
}

.empty-state p {
  font-size: 0.95rem;
}

/* ── Status badges ───────────────────────────────────── */
.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: capitalize;
}

.badge-submitted { background: var(--primary-light); color: var(--primary); }
.badge-approved  { background: #d4edda; color: #155724; }
.badge-rejected  { background: #f8d7da; color: #721c24; }

/* ── Cards ───────────────────────────────────────────── */
.card {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 32px;
}

.card-narrow {
  max-width: 480px;
}

/* ── Form elements (shared) ──────────────────────────── */
.form-group { margin-bottom: 18px; }

.form-group label {
  display: block;
  font-size: 0.83rem;
  font-weight: 600;
  color: var(--gray-700);
  margin-bottom: 6px;
}

.form-group .required { color: var(--danger); margin-left: 2px; }

.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  padding: 9px 13px;
  border: 1.5px solid var(--gray-300);
  border-radius: 6px;
  font-size: 0.875rem;
  font-family: inherit;
  color: var(--gray-900);
  background: #fff;
  transition: border-color 0.2s;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(0,51,160,0.1);
}

.form-group input:disabled,
.form-group input[readonly] {
  background: var(--gray-100);
  color: var(--gray-700);
  cursor: not-allowed;
}

.form-row { display: flex; gap: 16px; }
.form-row .form-group { flex: 1; }

.alert {
  padding: 11px 16px;
  border-radius: 6px;
  font-size: 0.875rem;
  margin-bottom: 18px;
  display: none;
}

.alert.visible { display: block; }

.alert-success {
  background: #d4edda;
  color: #155724;
  border: 1px solid #c3e6cb;
}

.alert-error {
  background: #f8d7da;
  color: #721c24;
  border: 1px solid #f5c6cb;
}

/* ── Modal ───────────────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 20px;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.2s, visibility 0.2s;
}

.modal-overlay.visible {
  opacity: 1;
  visibility: visible;
}

.modal {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: 0 8px 40px rgba(0,0,0,0.22);
  width: 100%;
  max-width: 560px;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transform: translateY(12px);
  transition: transform 0.2s;
}

.modal-overlay.visible .modal {
  transform: translateY(0);
}

.modal-lg { max-width: 740px; }

.modal-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--gray-200);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.modal-header h3 {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--gray-900);
}

.modal-close {
  background: none;
  border: none;
  font-size: 1.3rem;
  color: var(--gray-500);
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 4px;
  line-height: 1;
}

.modal-close:hover { background: var(--gray-200); color: var(--gray-900); }

.modal-body {
  padding: 24px;
  overflow-y: auto;
  flex: 1;
}

.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--gray-200);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  flex-shrink: 0;
}

/* ── View Application modal details ─────────────────── */
.detail-section {
  margin-bottom: 24px;
}

.detail-section-title {
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 2px solid var(--primary-light);
}

.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px 20px;
}

.detail-item { }

.detail-label {
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--gray-500);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 2px;
}

.detail-value {
  font-size: 0.9rem;
  color: var(--gray-900);
  word-break: break-word;
}

.detail-value.empty { color: var(--gray-500); font-style: italic; }

/* ── Loading spinner ─────────────────────────────────── */
.loading {
  padding: 48px;
  text-align: center;
  color: var(--gray-500);
  font-size: 0.9rem;
}

/* ── Misc ────────────────────────────────────────────── */
.text-muted { color: var(--gray-500); font-size: 0.82rem; }
.mt-1 { margin-top: 8px; }
.mt-2 { margin-top: 16px; }
</style>
</head>
<body>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-title">WPP</div>
      <div class="logo-sub">IT Asset Portal</div>
    </div>

    <nav class="sidebar-nav" id="nav"></nav>

    <div class="sidebar-footer">
      <div class="user-info" id="userInfo"></div>
      <button class="btn-logout" onclick="logout()">&#x2192; Sign Out</button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="content" id="content">
      <div class="loading">Loading&hellip;</div>
    </div>
  </div>

</div>

<!-- User modal -->
<div class="modal-overlay" id="userModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="userModalTitle">Add User</h3>
      <button class="modal-close" onclick="closeUserModal()">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div class="alert alert-error" id="userModalError"></div>
      <div class="form-row">
        <div class="form-group">
          <label for="umUsername">Username <span class="required">*</span></label>
          <input type="text" id="umUsername" autocomplete="off">
        </div>
        <div class="form-group">
          <label for="umPassword" id="umPasswordLabel">Password <span class="required">*</span></label>
          <input type="password" id="umPassword" autocomplete="new-password" placeholder="">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="umName">Full Name <span class="required">*</span></label>
          <input type="text" id="umName" autocomplete="off">
        </div>
        <div class="form-group">
          <label for="umEmail">Email <span class="required">*</span></label>
          <input type="email" id="umEmail" autocomplete="off">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="umOpco">OpCo <span class="required">*</span></label>
          <select id="umOpco">
            <option value="">-- Select --</option>
            <option>WPP HQ</option>
            <option>WPP ET</option>
            <option>WPP FM</option>
            <option>WPP SSC</option>
            <option>VML</option>
            <option>Oglivy</option>
            <option>Grey</option>
            <option>WPP Media</option>
            <option>AKQA</option>
            <option>Peclersparis</option>
            <option>Landor</option>
            <option>Design Bridge</option>
          </select>
        </div>
        <div class="form-group">
          <label for="umMarket">Market <span class="required">*</span></label>
          <select id="umMarket">
            <option value="">-- Select --</option>
            <option>Shanghai</option>
            <option>Beijing</option>
            <option>Guangzhou</option>
            <option>Wuxi</option>
            <option>Shenzhen</option>
            <option>Hongkong</option>
            <option>Taiwan</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label for="umRole">Role <span class="required">*</span></label>
        <select id="umRole">
          <option value="user">User</option>
          <option value="admin">Admin</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeUserModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveUser()">Save User</button>
    </div>
  </div>
</div>

<!-- View Application modal -->
<div class="modal-overlay" id="viewModal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3 id="viewModalTitle">Application Details</h3>
      <button class="modal-close" onclick="closeViewModal()">&#x2715;</button>
    </div>
    <div class="modal-body" id="viewModalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeViewModal()">Close</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ── State ──────────────────────────────────────────────────────────────────
var currentUser = null;
var currentView = 'my-applications';
var editingUserId = null;

// ── Init ───────────────────────────────────────────────────────────────────
async function init() {
  try {
    var res = await fetch('/api/me');
    if (!res.ok) { window.location.href = '/login'; return; }
    var data = await res.json();
    currentUser = data.user;
    renderSidebar();
    showView('my-applications');
  } catch (err) {
    window.location.href = '/login';
  }
}

// ── Sidebar ────────────────────────────────────────────────────────────────
function renderSidebar() {
  var items = [
    { id: 'my-applications',  label: 'My Applications',  icon: '&#128203;' },
    { id: 'new-application',  label: 'New Application',  icon: '&#43;',    href: '/' },
  ];
  if (currentUser.role === 'admin') {
    items.push({ id: 'all-applications', label: 'All Applications', icon: '&#128202;' });
    items.push({ id: 'user-management',  label: 'User Management',  icon: '&#128101;' });
  }
  items.push({ id: 'change-password', label: 'Change Password', icon: '&#128274;' });

  var nav = document.getElementById('nav');
  nav.innerHTML = items.map(function(item) {
    if (item.href) {
      return '<a class="nav-item" href="' + item.href + '" data-id="' + item.id + '">' +
        '<span class="nav-icon">' + item.icon + '</span>' +
        '<span>' + item.label + '</span></a>';
    }
    return '<div class="nav-item" data-id="' + item.id + '" onclick="showView(\'' + item.id + '\')">' +
      '<span class="nav-icon">' + item.icon + '</span>' +
      '<span>' + item.label + '</span></div>';
  }).join('');

  // User info
  var info = document.getElementById('userInfo');
  info.innerHTML =
    '<div class="user-name">' + esc(currentUser.name || currentUser.username) + '</div>' +
    '<div class="user-meta">' +
      '<span class="user-opco">' + esc(currentUser.opco || '') + '</span>' +
      '<span class="role-badge ' + currentUser.role + '">' + currentUser.role + '</span>' +
    '</div>';
}

function setActiveNav(id) {
  document.querySelectorAll('.nav-item').forEach(function(el) {
    el.classList.toggle('active', el.dataset.id === id);
  });
}

// ── View router ────────────────────────────────────────────────────────────
function showView(view) {
  currentView = view;
  setActiveNav(view);
  var content = document.getElementById('content');

  if (view === 'my-applications') {
    loadApplications(false);
  } else if (view === 'all-applications') {
    loadApplications(true);
  } else if (view === 'user-management') {
    loadUsers();
  } else if (view === 'change-password') {
    showChangePasswordForm();
  }
}

// ── Applications ───────────────────────────────────────────────────────────
async function loadApplications(showAll) {
  var content = document.getElementById('content');
  content.innerHTML = '<div class="loading">Loading&hellip;</div>';

  try {
    var res = await fetch('/api/applications');
    if (!res.ok) throw new Error('Failed to load');
    var data = await res.json();
    renderApplicationsView(data.applications || [], showAll);
  } catch (err) {
    content.innerHTML = '<div class="loading">Failed to load applications. Please try again.</div>';
  }
}

function renderApplicationsView(apps, showUser) {
  var title = showUser ? 'All Applications' : 'My Applications';
  var content = document.getElementById('content');

  var tableHtml;
  if (apps.length === 0) {
    tableHtml = '<div class="empty-state">' +
      '<span class="empty-icon">&#128203;</span>' +
      "<p>No applications yet. Click 'New Application' to get started.</p>" +
    '</div>';
  } else {
    var rows = apps.map(function(app) {
      var d = app.data || {};
      var date = app.created_at ? app.created_at.substring(0, 10) : '—';
      var userCol = showUser ? '<td>' + esc(app.submitted_by || app.user_id || '—') + '</td>' : '';
      return '<tr>' +
        '<td><span class="text-muted" style="font-family:monospace;font-size:0.8rem;">' + esc(app.request_id) + '</span></td>' +
        '<td>' + esc(d.agency || '—') + '</td>' +
        '<td>' + esc(d.laptopModel || '—') + '</td>' +
        '<td>' + esc(String(d.quantity || '—')) + '</td>' +
        '<td>' + esc(date) + '</td>' +
        userCol +
        '<td><div class="actions-cell">' +
          '<button class="btn btn-sm btn-secondary btn-icon" title="View" onclick="viewApplication(' + JSON.stringify(JSON.stringify(app)) + ')">&#128065;</button>' +
          '<button class="btn btn-sm btn-secondary btn-icon" title="Edit" onclick="editApplication(\'' + esc(app.id) + '\')">&#9998;</button>' +
          '<button class="btn btn-sm btn-danger btn-icon" title="Delete" onclick="deleteApplication(\'' + esc(app.id) + '\')">&#128465;</button>' +
        '</div></td>' +
      '</tr>';
    }).join('');

    var userHeader = showUser ? '<th>Submitted By</th>' : '';
    tableHtml = '<div class="table-card"><div class="table-wrapper"><table>' +
      '<thead><tr>' +
        '<th>Request ID</th><th>OpCo</th><th>Device Model</th><th>Quantity</th><th>Date</th>' +
        userHeader + '<th>Actions</th>' +
      '</tr></thead>' +
      '<tbody>' + rows + '</tbody>' +
    '</table></div></div>';
  }

  content.innerHTML =
    '<div class="page-header">' +
      '<h2>' + esc(title) + '</h2>' +
      '<button class="btn btn-primary" onclick="exportAll()">&#8595; Export All</button>' +
    '</div>' +
    tableHtml;
}

async function deleteApplication(id) {
  if (!confirm('Are you sure you want to delete this application?')) return;
  try {
    var res = await fetch('/api/applications/' + id, { method: 'DELETE' });
    if (!res.ok) {
      var d = await res.json();
      alert(d.error || 'Delete failed');
      return;
    }
    showView(currentView);
  } catch (err) {
    alert('Delete failed. Please try again.');
  }
}

function editApplication(id) {
  window.location.href = '/?edit=' + id;
}

function viewApplication(appJson) {
  var app = JSON.parse(appJson);
  var d = app.data || {};

  function dv(val) {
    if (val === undefined || val === null || val === '') {
      return '<span class="detail-value empty">—</span>';
    }
    if (Array.isArray(val)) {
      return '<span class="detail-value">' + val.map(esc).join(', ') + '</span>';
    }
    return '<span class="detail-value">' + esc(String(val)) + '</span>';
  }

  function row(label, val) {
    return '<div class="detail-item"><div class="detail-label">' + esc(label) + '</div>' + dv(val) + '</div>';
  }

  var html =
    '<div class="detail-section">' +
      '<div class="detail-section-title">Request Info</div>' +
      '<div class="detail-grid">' +
        row('Request ID', app.request_id) +
        row('Status', app.status) +
        row('Submitted', app.created_at ? app.created_at.substring(0,10) : '') +
        row('Last Updated', app.updated_at ? app.updated_at.substring(0,10) : '') +
      '</div>' +
    '</div>' +

    '<div class="detail-section">' +
      '<div class="detail-section-title">Applicant &amp; Company</div>' +
      '<div class="detail-grid">' +
        row('Agency / OpCo', d.agency) +
        row('Market', d.market) +
        row('Applicant Name', d.applicantName) +
        row('Applicant Email', d.applicantEmail) +
        row('Department', d.department) +
        row('Cost Center', d.costCenter) +
      '</div>' +
    '</div>' +

    '<div class="detail-section">' +
      '<div class="detail-section-title">Device Request</div>' +
      '<div class="detail-grid">' +
        row('Laptop Model', d.laptopModel) +
        row('Quantity', d.quantity) +
        row('Request Type', d.requestType) +
        row('Priority', d.priority) +
        row('Required Date', d.requiredDate) +
        row('Operating System', d.operatingSystem) +
      '</div>' +
    '</div>';

  if (d.accessories && d.accessories.length) {
    html += '<div class="detail-section">' +
      '<div class="detail-section-title">Accessories</div>' +
      '<div class="detail-grid">' +
        row('Accessories', d.accessories) +
      '</div>' +
    '</div>';
  }

  if (d.oldAssetTag || d.oldSerialNumber) {
    html += '<div class="detail-section">' +
      '<div class="detail-section-title">Replacement Device</div>' +
      '<div class="detail-grid">' +
        row('Old Asset Tag', d.oldAssetTag) +
        row('Old Serial Number', d.oldSerialNumber) +
        row('Old Device Condition', d.oldDeviceCondition) +
      '</div>' +
    '</div>';
  }

  if (d.justification || d.additionalNotes) {
    html += '<div class="detail-section">' +
      '<div class="detail-section-title">Notes</div>' +
      '<div class="detail-grid">' +
        row('Justification', d.justification) +
        row('Additional Notes', d.additionalNotes) +
      '</div>' +
    '</div>';
  }

  document.getElementById('viewModalTitle').textContent = 'Application – ' + (app.request_id || '');
  document.getElementById('viewModalBody').innerHTML = html;
  document.getElementById('viewModal').classList.add('visible');
}

function closeViewModal() {
  document.getElementById('viewModal').classList.remove('visible');
}

function exportAll() {
  window.location.href = '/api/applications/export';
}

// ── User Management ────────────────────────────────────────────────────────
async function loadUsers() {
  var content = document.getElementById('content');
  content.innerHTML = '<div class="loading">Loading&hellip;</div>';

  try {
    var res = await fetch('/api/users');
    if (!res.ok) throw new Error('Failed to load');
    var data = await res.json();
    renderUsersView(data.users || []);
  } catch (err) {
    content.innerHTML = '<div class="loading">Failed to load users. Please try again.</div>';
  }
}

var _usersCache = {};

function editUserById(id) {
  var user = _usersCache[id] || null;
  showUserModal(user ? JSON.stringify(user) : null);
}

function renderUsersView(users) {
  _usersCache = {};
  users.forEach(function(u) { _usersCache[u.id] = u; });
  var content = document.getElementById('content');

  var tableHtml;
  if (users.length === 0) {
    tableHtml = '<div class="empty-state"><span class="empty-icon">&#128101;</span><p>No users found.</p></div>';
  } else {
    var rows = users.map(function(u) {
      return '<tr>' +
        '<td><strong>' + esc(u.username) + '</strong></td>' +
        '<td>' + esc(u.name || '—') + '</td>' +
        '<td>' + esc(u.email || '—') + '</td>' +
        '<td>' + esc(u.opco || '—') + '</td>' +
        '<td>' + esc(u.market || '—') + '</td>' +
        '<td><span class="role-badge ' + esc(u.role) + '">' + esc(u.role) + '</span></td>' +
        '<td><div class="actions-cell">' +
          '<button class="btn btn-sm btn-secondary" onclick="editUserById(\'' + esc(u.id) + '\')">&#9998; Edit</button>' +
          '<button class="btn btn-sm btn-danger" onclick="deleteUser(\'' + esc(u.id) + '\')" ' + (u.id === currentUser.id ? 'disabled title="Cannot delete yourself"' : '') + '>&#128465;</button>' +
        '</div></td>' +
      '</tr>';
    }).join('');

    tableHtml = '<div class="table-card"><div class="table-wrapper"><table>' +
      '<thead><tr><th>Username</th><th>Name</th><th>Email</th><th>OpCo</th><th>Market</th><th>Role</th><th>Actions</th></tr></thead>' +
      '<tbody>' + rows + '</tbody>' +
    '</table></div></div>';
  }

  content.innerHTML =
    '<div class="page-header">' +
      '<h2>User Management</h2>' +
      '<button class="btn btn-primary" onclick="showUserModal(null)">&#43; Add User</button>' +
    '</div>' +
    tableHtml;
}

function showUserModal(userJson) {
  var user = userJson ? JSON.parse(userJson) : null;
  editingUserId = user ? user.id : null;

  document.getElementById('userModalTitle').textContent = user ? 'Edit User' : 'Add User';
  document.getElementById('userModalError').textContent = '';
  document.getElementById('userModalError').classList.remove('visible');

  document.getElementById('umUsername').value  = user ? user.username : '';
  document.getElementById('umUsername').disabled = !!user;
  document.getElementById('umPassword').value  = '';
  document.getElementById('umPassword').placeholder = user ? 'Leave blank to keep current' : '';
  document.getElementById('umPasswordLabel').innerHTML = user
    ? 'Password'
    : 'Password <span class="required">*</span>';

  document.getElementById('umName').value   = user ? (user.name || '') : '';
  document.getElementById('umEmail').value  = user ? (user.email || '') : '';
  document.getElementById('umOpco').value   = user ? (user.opco || '') : '';
  document.getElementById('umMarket').value = user ? (user.market || '') : '';
  document.getElementById('umRole').value   = user ? (user.role || 'user') : 'user';

  document.getElementById('userModal').classList.add('visible');
}

function closeUserModal() {
  document.getElementById('userModal').classList.remove('visible');
  editingUserId = null;
}

async function saveUser() {
  var errEl = document.getElementById('userModalError');
  errEl.classList.remove('visible');

  var username = document.getElementById('umUsername').value.trim();
  var password = document.getElementById('umPassword').value;
  var name     = document.getElementById('umName').value.trim();
  var email    = document.getElementById('umEmail').value.trim();
  var opco     = document.getElementById('umOpco').value;
  var market   = document.getElementById('umMarket').value;
  var role     = document.getElementById('umRole').value;

  // Validation
  if (!editingUserId && !username) { showUserError('Username is required.'); return; }
  if (!editingUserId && !password) { showUserError('Password is required.'); return; }
  if (!name)   { showUserError('Full Name is required.'); return; }
  if (!email)  { showUserError('Email is required.'); return; }
  if (!opco)   { showUserError('OpCo is required.'); return; }
  if (!market) { showUserError('Market is required.'); return; }

  var body = { email: email, name: name, opco: opco, market: market, role: role };
  if (!editingUserId) {
    body.username = username;
    body.password = password;
  } else if (password) {
    body.password = password;
  }

  try {
    var url    = editingUserId ? '/api/users/' + editingUserId : '/api/users';
    var method = editingUserId ? 'PUT' : 'POST';
    var res = await fetch(url, {
      method: method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    var data = await res.json();
    if (data.success) {
      closeUserModal();
      loadUsers();
    } else {
      showUserError(data.error || 'Save failed.');
    }
  } catch (err) {
    showUserError('Request failed. Please try again.');
  }
}

function showUserError(msg) {
  var el = document.getElementById('userModalError');
  el.textContent = msg;
  el.classList.add('visible');
}

async function deleteUser(id) {
  if (!confirm('Are you sure you want to delete this user?')) return;
  try {
    var res = await fetch('/api/users/' + id, { method: 'DELETE' });
    var data = await res.json();
    if (data.success) {
      loadUsers();
    } else {
      alert(data.error || 'Delete failed.');
    }
  } catch (err) {
    alert('Delete failed. Please try again.');
  }
}

// ── Change Password ────────────────────────────────────────────────────────
function showChangePasswordForm() {
  var content = document.getElementById('content');
  content.innerHTML =
    '<div class="page-header"><h2>Change Password</h2></div>' +
    '<div class="card card-narrow">' +
      '<div class="alert alert-error" id="cpError"></div>' +
      '<div class="alert alert-success" id="cpSuccess"></div>' +
      '<form onsubmit="changePassword(event)">' +
        '<div class="form-group">' +
          '<label for="cpOldPassword">Current Password <span class="required">*</span></label>' +
          '<input type="password" id="cpOldPassword" autocomplete="current-password" required>' +
        '</div>' +
        '<div class="form-group">' +
          '<label for="cpNewPassword">New Password <span class="required">*</span></label>' +
          '<input type="password" id="cpNewPassword" autocomplete="new-password" required>' +
        '</div>' +
        '<div class="form-group">' +
          '<label for="cpConfirmPassword">Confirm New Password <span class="required">*</span></label>' +
          '<input type="password" id="cpConfirmPassword" autocomplete="new-password" required>' +
        '</div>' +
        '<div style="display:flex;gap:10px;margin-top:4px;">' +
          '<button type="submit" class="btn btn-primary">Update Password</button>' +
        '</div>' +
      '</form>' +
    '</div>';
}

async function changePassword(e) {
  e.preventDefault();
  var oldPass     = document.getElementById('cpOldPassword').value;
  var newPass     = document.getElementById('cpNewPassword').value;
  var confirmPass = document.getElementById('cpConfirmPassword').value;

  hideCpMessages();

  if (newPass !== confirmPass) { showCpError('Passwords do not match.'); return; }
  if (newPass.length < 6) { showCpError('New password must be at least 6 characters.'); return; }

  try {
    var res = await fetch('/api/change-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ old_password: oldPass, new_password: newPass }),
    });
    var data = await res.json();
    if (data.success) {
      showCpSuccess('Password changed successfully!');
      document.getElementById('cpOldPassword').value = '';
      document.getElementById('cpNewPassword').value = '';
      document.getElementById('cpConfirmPassword').value = '';
    } else {
      showCpError(data.error || 'Failed to change password.');
    }
  } catch (err) {
    showCpError('Request failed. Please try again.');
  }
}

function hideCpMessages() {
  var e = document.getElementById('cpError');
  var s = document.getElementById('cpSuccess');
  if (e) { e.textContent = ''; e.classList.remove('visible'); }
  if (s) { s.textContent = ''; s.classList.remove('visible'); }
}

function showCpError(msg) {
  var el = document.getElementById('cpError');
  if (el) { el.textContent = msg; el.classList.add('visible'); }
}

function showCpSuccess(msg) {
  var el = document.getElementById('cpSuccess');
  if (el) { el.textContent = msg; el.classList.add('visible'); }
}

// ── Auth ───────────────────────────────────────────────────────────────────
async function logout() {
  try { await fetch('/api/logout', { method: 'POST' }); } catch (e) { /* ignore */ }
  window.location.href = '/login';
}

// ── Helpers ────────────────────────────────────────────────────────────────
function esc(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// Close modals on overlay click
document.getElementById('userModal').addEventListener('click', function(e) {
  if (e.target === this) closeUserModal();
});
document.getElementById('viewModal').addEventListener('click', function(e) {
  if (e.target === this) closeViewModal();
});

// Keyboard: ESC closes modals
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeUserModal();
    closeViewModal();
  }
});

window.addEventListener('DOMContentLoaded', init);
